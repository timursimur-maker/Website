<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Durchblicke – Dateizuordnung</title>
  <style>
    body {
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#f4f3ef;
      color:#111;
    }
    header {
      max-width:1100px;
      margin:0 auto;
      padding:32px 18px 18px;
    }
    h1 { margin:0 0 10px; font-size:clamp(2rem,6vw,4rem); }
    p { color:#555; line-height:1.5; max-width:720px; }
    main {
      max-width:1100px;
      margin:0 auto;
      padding:18px;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:28px 18px;
    }
    .card { margin:0; }
    .card img {
      width:100%;
      height:auto;
      display:block;
      background:#ddd;
    }
    figcaption {
      padding-top:9px;
      font-size:14px;
      line-height:1.35;
      word-break:break-all;
    }
    @media (max-width:760px) {
      main { grid-template-columns:1fr; gap:42px; }
      figcaption { font-size:16px; }
    }
  </style>
</head>

  <header>
    <h1>Dateizuordnung</h1>
    <p>Diese Hilfsseite zeigt jedes Bild zusammen mit seinem exakten Dateinamen. Sie verändert die eigentliche Website nicht.</p>
